---
# ============================================================
# fast.ai EC2 Provisioning Playbook
# Target: g4dn.xlarge running Ubuntu 20.04
#
# Usage:
#   ansible-playbook -i inventory.ini playbook.yml
# ============================================================

- name: fast.ai GPU instance setup
  hosts: fastai
  become: false   # Most tasks run as ubuntu; sudo is applied per-task
  gather_facts: true

  vars:
    fastai_home: "/home/ubuntu"
    miniconda_installer: "Miniconda3-latest-Linux-x86_64.sh"
    miniconda_url: "https://repo.anaconda.com/miniconda/{{ miniconda_installer }}"
    miniconda_dir: "{{ fastai_home }}/miniconda3"
    conda_bin: "{{ miniconda_dir }}/bin/conda"
    mamba_bin: "{{ miniconda_dir }}/bin/mamba"

  # ──────────────────────────────────────────
  # PHASE 1 – System packages
  # ──────────────────────────────────────────
  tasks:
    - name: Wait for SSH to be available
      wait_for_connection:
        timeout: 120

    - name: Update apt cache
      become: true
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install base packages
      become: true
      apt:
        name:
          - git
          - curl
          - build-essential
          - apt-utils
        state: present

    # ──────────────────────────────────────────
    # PHASE 2 – fast.ai fastsetup scripts
    # ──────────────────────────────────────────
    - name: Clone fastsetup repo
      git:
        repo: https://github.com/fastai/fastsetup.git
        dest: "{{ fastai_home }}/fastsetup"
        version: master
        force: true

    - name: Run ubuntu-initial.sh (system hardening + basic config)
      become: true
      shell: "bash {{ fastai_home }}/fastsetup/ubuntu-initial.sh"
      args:
        executable: /bin/bash
      register: ubuntu_initial
      changed_when: ubuntu_initial.rc == 0

    # ──────────────────────────────────────────
    # PHASE 3 – Miniconda
    # ──────────────────────────────────────────
    - name: Check if Miniconda is already installed
      stat:
        path: "{{ conda_bin }}"
      register: conda_installed

    - name: Download Miniconda installer
      get_url:
        url: "{{ miniconda_url }}"
        dest: "/tmp/{{ miniconda_installer }}"
        mode: "0755"
      when: not conda_installed.stat.exists

    - name: Install Miniconda
      shell: "bash /tmp/{{ miniconda_installer }} -b -p {{ miniconda_dir }}"
      args:
        executable: /bin/bash
        creates: "{{ conda_bin }}"
      when: not conda_installed.stat.exists

    - name: Add conda to PATH in .bashrc
      lineinfile:
        path: "{{ fastai_home }}/.bashrc"
        line: 'export PATH="{{ miniconda_dir }}/bin:$PATH"'
        state: present

    - name: Initialize conda for bash
      shell: "{{ conda_bin }} init bash"
      args:
        executable: /bin/bash
      changed_when: false

    # ──────────────────────────────────────────
    # PHASE 4 – mamba (faster conda solver)
    # ──────────────────────────────────────────
    - name: Install mamba into base environment
      shell: "{{ conda_bin }} install -yq -n base -c conda-forge mamba"
      args:
        executable: /bin/bash
        creates: "{{ mamba_bin }}"

    # ──────────────────────────────────────────
    # PHASE 5 – NVIDIA GPU drivers
    # ──────────────────────────────────────────
    - name: Install ubuntu-drivers-common
      become: true
      apt:
        name: ubuntu-drivers-common
        state: present

    - name: Detect recommended NVIDIA driver
      become: true
      shell: ubuntu-drivers devices | grep 'recommended' | grep -oP 'nvidia-driver-\d+'
      register: nvidia_driver_rec
      changed_when: false
      failed_when: false

    - name: Set driver package name
      set_fact:
        # Fall back to nvidia-driver-470-server if detection returns nothing
        nvidia_driver_pkg: >-
          {{
            (nvidia_driver_rec.stdout | trim) + '-server'
            if nvidia_driver_rec.stdout | trim != ''
            else 'nvidia-driver-470-server'
          }}

    - name: Install NVIDIA driver ({{ nvidia_driver_pkg }})
      become: true
      apt:
        name: "{{ nvidia_driver_pkg }}"
        state: present
        update_cache: true

    - name: Load nvidia kernel module
      become: true
      modprobe:
        name: nvidia
        state: present
      ignore_errors: true   # May need a reboot first; the reboot task below handles it

    - name: Reboot to activate NVIDIA driver
      become: true
      reboot:
        reboot_timeout: 300
        msg: "Rebooting to activate NVIDIA driver"

    - name: Verify GPU is visible (nvidia-smi)
      command: nvidia-smi
      register: nvidia_smi
      changed_when: false

    - name: Print nvidia-smi output
      debug:
        msg: "{{ nvidia_smi.stdout_lines }}"

    # ──────────────────────────────────────────
    # PHASE 6 – fastai / fastbook / Jupyter
    # ──────────────────────────────────────────
    - name: Install fastbook (includes fastai + PyTorch + CUDA deps)
      shell: "{{ mamba_bin }} install -y -c fastai fastbook"
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ miniconda_dir }}/bin:{{ ansible_env.PATH }}"

    - name: Install Jupyter
      shell: "{{ mamba_bin }} install -y jupyter"
      args:
        executable: /bin/bash
      environment:
        PATH: "{{ miniconda_dir }}/bin:{{ ansible_env.PATH }}"

    # ──────────────────────────────────────────
    # PHASE 7 – Course notebooks
    # ──────────────────────────────────────────
    - name: Clone fastbook notebooks
      git:
        repo: https://github.com/fastai/fastbook.git
        dest: "{{ fastai_home }}/fastbook"
        version: master
        force: false

    # ──────────────────────────────────────────
    # PHASE 8 – Summary
    # ──────────────────────────────────────────
    - name: Setup complete — print connection instructions
      debug:
        msg:
          - "=============================================="
          - " fast.ai setup complete!"
          - "=============================================="
          - ""
          - "SSH with Jupyter tunnel:"
          - "  ssh -L localhost:8888:localhost:8888 ubuntu@{{ ansible_host }}"
          - ""
          - "Then on the server start Jupyter:"
          - "  cd ~/fastbook && jupyter notebook"
          - ""
          - "Open in your browser:"
          - "  http://localhost:8888"
          - "=============================================="
